{% extends "base.html" %}

{% block title %}Cost Comparison{% endblock %}

{% block content %}
<div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold mb-4">Cost Comparison</h1>
    
    <div id="cost-table-container"
         hx-get="/api/costs"
         hx-trigger="load"
         hx-swap="innerHTML"
         class="overflow-x-auto">
        <!-- HTMX will load the table here -->
        <div class="text-gray-500">Loading costs...</div>
    </div>
</div>

<script>
    // Custom script to handle the JSON response from /api/costs and render the table
    document.addEventListener('htmx:afterOnLoad', function(event) {
        const container = document.getElementById('cost-table-container');
        const data = event.detail.elt.getAttribute('data-costs-json');
        if (data) {
            const costs = JSON.parse(data);
            renderTable(costs, container);
        }
    });
    
    // Alternative: Use a client-side script to handle the response if HTMX doesn't parse JSON to HTML automatically
    // Since HTMX expects HTML for `hx-swap="innerHTML"`, we need a partial template or JS to convert JSON.
    // Let's use a simple JS approach to render the table after HTMX fetches the JSON.
</script>

<style>
    /* Tailwind handles most styling, but we might need specific table styles */
</style>

<script>
    // HTMX handles the fetch, but we need to convert JSON to HTML.
    // We can use a client-side script to intercept the response or use a partial template.

    // We will use a script to handle the response.
