<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen Town</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e17; }
        #game-canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <!-- PixiJS Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- HUD Overlay -->
    <div id="hud" class="fixed top-4 left-4 z-50 select-none">
        <div class="bg-gray-900/80 backdrop-blur-sm border border-amber-500/30 rounded-lg px-5 py-4 shadow-xl shadow-amber-900/10">
            <div class="flex items-center justify-between mb-1">
                <h1 class="text-amber-400 font-bold text-lg tracking-wide">Qwen Town</h1>
                <div class="flex gap-3 pointer-events-auto">
                    <a href="/timeline" class="text-xs text-gray-400 hover:text-amber-400 transition-colors">Timeline</a>
                    <a href="/dashboard" class="text-xs text-gray-400 hover:text-amber-400 transition-colors">Dashboard</a>
                </div>
            </div>
            <p class="text-gray-500 text-xs mb-3">A self-evolving town built entirely by a local AI</p>
            <div class="grid grid-cols-2 gap-x-6 gap-y-1.5 text-sm pointer-events-none">
                <span class="text-gray-400">Tick</span>
                <span id="hud-tick" class="text-gray-200 font-mono tabular-nums">0</span>
                <span class="text-gray-400">Day</span>
                <span id="hud-day" class="text-gray-200 font-mono tabular-nums">1</span>
                <span class="text-gray-400">Population</span>
                <span id="hud-pop" class="text-gray-200 font-mono tabular-nums">0</span>
                <span class="text-gray-400">Gold</span>
                <span id="hud-gold" class="text-amber-300 font-mono tabular-nums">0</span>
            </div>
        </div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="fixed z-50 pointer-events-none hidden">
        <div class="bg-gray-900/95 backdrop-blur-sm border border-gray-600 rounded-md px-3 py-2 shadow-lg text-sm max-w-xs">
            <div id="tooltip-content" class="text-gray-200"></div>
        </div>
    </div>

    <!-- PixiJS from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <!-- Town renderer -->
    <script src="/static/js/town.js?v=4"></script>
</body>
</html>
