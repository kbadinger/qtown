name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Proto Lint ───
  proto-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: cd proto && buf lint
      - run: cd proto && buf breaking --against 'https://github.com/${{ github.repository }}.git#subdir=proto,branch=main'
        if: github.event_name == 'pull_request'

  # ─── Town Core (Python) ───
  test-town-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd services/town-core
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff
      - name: Lint
        run: cd services/town-core && ruff check engine/ --select E,F,W
      - name: Test
        run: cd services/town-core && python -m pytest tests/ -v --tb=short

  # ─── Market District (Go) ───
  test-market:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: cd services/market-district && go build ./...
      - name: Vet
        run: cd services/market-district && go vet ./...
      - name: Test
        run: cd services/market-district && go test ./... -v -race -count=1
      - name: Benchmark
        run: cd services/market-district && go test -bench=. -benchtime=5s ./internal/orderbook/

  # ─── Fortress (Rust) ───
  test-fortress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/fortress
      - name: Check
        run: cd services/fortress && cargo check
      - name: Clippy
        run: cd services/fortress && cargo clippy -- -D warnings
      - name: Test
        run: cd services/fortress && cargo test
      - name: Zero unsafe check
        run: |
          count=$(grep -r 'unsafe' services/fortress/src/rules/ services/fortress/src/validation/ 2>/dev/null | grep -v '//' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found $count unsafe blocks in validation/rules code"
            exit 1
          fi
          echo "PASS: Zero unsafe blocks in validation path"

  # ─── Tavern (Node/TypeScript) ───
  test-tavern:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: cd services/tavern && npm install
      - name: Type check
        run: cd services/tavern && npx tsc --noEmit
      - name: Lint
        run: cd services/tavern && npx eslint src/ || true  # non-blocking until config exists
      - name: Test
        run: cd services/tavern && npm test || true  # non-blocking until tests exist

  # ─── Academy (Python) ───
  test-academy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: cd services/academy && pip install -e ".[dev]"
      - name: Lint
        run: cd services/academy && ruff check .
      - name: Type check
        run: cd services/academy && mypy academy/ --ignore-missing-imports || true
      - name: Test
        run: cd services/academy && pytest tests/ -v --tb=short

  # ─── Cartographer (GraphQL/TypeScript) ───
  test-cartographer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: cd services/cartographer && npm install
      - name: Type check
        run: cd services/cartographer && npx tsc --noEmit
      - name: Test
        run: cd services/cartographer && npm test || true

  # ─── Docker Build (all images) ───
  docker-build:
    runs-on: ubuntu-latest
    needs: [test-town-core, test-market, test-fortress, test-tavern, test-academy, test-cartographer]
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        service:
          - { name: town-core, path: services/town-core }
          - { name: market-district, path: services/market-district }
          - { name: fortress, path: services/fortress }
          - { name: tavern, path: services/tavern }
          - { name: academy, path: services/academy }
          - { name: cartographer, path: services/cartographer }
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service.name }}
        run: docker build -t qtown/${{ matrix.service.name }}:ci ${{ matrix.service.path }}

  # ─── Docker Push (main only) ───
  docker-push:
    runs-on: ubuntu-latest
    needs: [test-town-core, test-market, test-fortress, test-tavern, test-academy, test-cartographer]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    strategy:
      matrix:
        service: [town-core, market-district, fortress, tavern, academy, cartographer]
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.service }}
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/qtown-${{ matrix.service }}:latest
          docker build -t $IMAGE services/${{ matrix.service }}/
          docker push $IMAGE
