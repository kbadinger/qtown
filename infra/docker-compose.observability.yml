version: "3.9"

networks:
  observability:
    driver: bridge
  qtown:
    external: true
    name: qtown_default

volumes:
  prometheus_data: {}
  grafana_data: {}
  loki_data: {}
  jaeger_data: {}

services:
  # ---------------------------------------------------------------------------
  # Jaeger — distributed tracing
  # ---------------------------------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: qtown-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger_data:/badger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver (all services point here)
      - "4318:4318"     # OTLP HTTP receiver
      - "14268:14268"   # Jaeger thrift HTTP
    networks:
      - observability
      - qtown
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ | grep -q Jaeger || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Prometheus — metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: qtown-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
      - qtown
    depends_on:
      - jaeger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Loki — log aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.7
    container_name: qtown-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
      - qtown
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Promtail — log shipper → Loki
  # ---------------------------------------------------------------------------
  promtail:
    image: grafana/promtail:2.9.7
    container_name: qtown-promtail
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: >
      -config.file=/etc/promtail/config.yml
      -config.expand-env=true
    environment:
      LOKI_URL: http://loki:3100/loki/api/v1/push
    entrypoint: >
      /bin/sh -c "
      cat > /etc/promtail/config.yml << 'EOF'
      server:
        http_listen_port: 9080
        grpc_listen_port: 0
      positions:
        filename: /tmp/positions.yaml
      clients:
        - url: http://loki:3100/loki/api/v1/push
      scrape_configs:
        - job_name: docker
          docker_sd_configs:
            - host: unix:///var/run/docker.sock
              refresh_interval: 5s
          relabel_configs:
            - source_labels: [__meta_docker_container_name]
              regex: /(.*)
              target_label: container
            - source_labels: [__meta_docker_container_label_com_docker_compose_service]
              target_label: service
      EOF
      exec /usr/bin/promtail -config.file=/etc/promtail/config.yml
      "
    networks:
      - observability
      - qtown
    depends_on:
      - loki

  # ---------------------------------------------------------------------------
  # Grafana — dashboards
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.4.1
    container_name: qtown-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-qtown-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: "traceToMetrics,traceToLogs"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - observability
      - qtown
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
