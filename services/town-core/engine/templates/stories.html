{% extends "base.html" %}

{% block title %}Stories — Qwen Town{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8" id="stories-root"
     hx-get="/api/stories-data" hx-trigger="load, every 30s"
     hx-target="#stories-content" hx-swap="innerHTML">
    <h1 class="text-2xl font-bold text-amber-400 mb-6">Stories</h1>
    <div id="stories-content">
        <p class="text-gray-400">Loading...</p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener("htmx:beforeSwap", function(evt) {
    if (evt.detail.target.id !== "stories-content") return;
    try {
        const data = JSON.parse(evt.detail.serverResponse);
        evt.detail.serverResponse = renderStories(data);
    } catch (e) {}
});

function renderStories(data) {
    const stories = data.stories || [];
    const counts = {done: 0, failed: 0, in_progress: 0, pending: 0};
    stories.forEach(s => { counts[s.status] = (counts[s.status] || 0) + 1; });

    const summaryHtml = `
    <div class="flex gap-4 mb-6 text-sm">
        <span class="px-3 py-1 rounded-full bg-green-900/50 text-green-400">${counts.done} done</span>
        <span class="px-3 py-1 rounded-full bg-yellow-900/50 text-yellow-400">${counts.in_progress} in progress</span>
        <span class="px-3 py-1 rounded-full bg-red-900/50 text-red-400">${counts.failed} failed</span>
        <span class="px-3 py-1 rounded-full bg-gray-800 text-gray-400">${counts.pending} pending</span>
    </div>`;

    const rows = stories.map(s => {
        const badge = statusBadge(s.status);
        const tags = (s.tags || []).map(t =>
            `<span class="px-1.5 py-0.5 text-xs rounded bg-gray-800 text-gray-400">${escapeHtml(t)}</span>`
        ).join(" ");
        const commit = s.commit_url
            ? `<a href="${s.commit_url}" target="_blank" rel="noopener" class="text-blue-400 hover:text-blue-300 font-mono text-xs">${s.commit_url.split('/').pop().slice(0,7)}</a>`
            : `<span class="text-gray-600">&mdash;</span>`;

        return `<tr class="border-b border-gray-800 hover:bg-gray-800/50">
            <td class="py-2 pr-3 font-mono text-gray-500 text-sm">${escapeHtml(s.id)}</td>
            <td class="py-2 pr-3 text-gray-200 text-sm">${escapeHtml(s.title)}</td>
            <td class="py-2 pr-3">${badge}</td>
            <td class="py-2 pr-3 text-center text-sm text-gray-400 font-mono">${s.attempts}</td>
            <td class="py-2 pr-3">${tags}</td>
            <td class="py-2">${commit}</td>
        </tr>`;
    }).join("");

    return `
    ${summaryHtml}
    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-gray-700 text-gray-400 text-left">
                    <th class="py-2 pr-3">ID</th>
                    <th class="py-2 pr-3">Title</th>
                    <th class="py-2 pr-3">Status</th>
                    <th class="py-2 pr-3 text-center">Attempts</th>
                    <th class="py-2 pr-3">Tags</th>
                    <th class="py-2">Commit</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>
    </div>`;
}

function statusBadge(status) {
    const styles = {
        done: "bg-green-900/50 text-green-400",
        in_progress: "bg-yellow-900/50 text-yellow-400",
        failed: "bg-red-900/50 text-red-400",
        pending: "bg-gray-800 text-gray-500",
    };
    const cls = styles[status] || styles.pending;
    return `<span class="px-2 py-0.5 rounded-full text-xs font-medium ${cls}">${escapeHtml(status)}</span>`;
}

function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
}
</script>
{% endblock %}
