[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "qtown-library"
version = "0.1.0"
description = "Qtown Library Service — full-text search and aggregation"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "elasticsearch[async]>=8.13.0",
    "aiokafka>=0.10.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "anyio>=4.0.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["library/tests"]

[tool.hatch.build.targets.wheel]
packages = ["library"]
