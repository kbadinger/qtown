    office:
      - {activity: paperwork, roles: [official]}
      - {activity: meeting, roles: [official]}
  home:
    living_room:
      - {activity: relaxing, roles: [child]}
      - {activity: talking, roles: [farmer, child]}
      - {activity: eating, roles: [farmer]}
    bedroom:
      - {activity: sleeping, roles: [farmer]}
      - {activity: dressing, roles: [farmer]}
    kitchen:
      - {activity: cooking, roles: [cook]}
      - {activity: eating, roles: [child]}
  blacksmith:
    forge:
      - {activity: forging, roles: [smith]}
      - {activity: repairing, roles: [smith]}
    showroom:
      - {activity: selling, roles: [smith]}
      - {activity: browsing, roles: [trader]}
  bakery:
    bakehouse:
      - {activity: baking, roles: [cook]}
      - {activity: kneading, roles: [cook]}
    shopfront:
      - {activity: selling, roles: [cook]}
      - {activity: browsing, roles: [child]}
  farm:
    barn:
      - {activity: tending, roles: [farmer]}
      - {activity: repairing, roles: [artisan]}
    greenhouse:
      - {activity: planting, roles: [farmer]}
      - {activity: harvesting, roles: [farmer]}
  clinic:
    examination:
      - {activity: examining, roles: [healer]}
      - {activity: treating, roles: [healer]}
    dispensary:
      - {activity: preparing, roles: [healer]}
      - {activity: dispensing, roles: [healer]}
  temple:
    sanctuary:
      - {activity: meditating, roles: [scholar]}
      - {activity: praying, roles: [official]}
      - {activity: gathering, roles: [trader, child]}
    garden:
      - {activity: walking, roles: [scholar]}
      - {activity: contemplating, roles: [scholar]}
  workshop:
    workspace:
      - {activity: crafting, roles: [artisan]}
      - {activity: fixing, roles: [artisan]}
      - {activity: learning, roles: [child, artisan]}
      - {activity: collaborating, roles: [artisan, scholar]}
  warehouse:
    storage_floor:
      - {activity: moving, roles: [artisan, farmer]}
      - {activity: organizing, roles: [artisan]}
  bank:
    lobby:
      - {activity: transacting, roles: [official, trader]}
      - {activity: queuing, roles: [trader, farmer]}
    vault:
      - {activity: securing, roles: [guard]}
      - {activity: auditing, roles: [official]}
  courthouse:
    courtroom:
      - {activity: judging, roles: [official]}
      - {activity: testifying, roles: [trader]}
      - {activity: listening, roles: [official, child]}
  restoration_center:
    counseling:
      - {activity: counseling, roles: [healer]}
      - {activity: listening, roles: [healer]}
      - {activity: restoring, roles: [healer]}
    reflection_garden:
      - {activity: reflecting, roles: [official]}
      - {activity: walking, roles: [healer]}
      - {activity: meditating, roles: [scholar]}
  theater:
    stage:
      - {activity: performing, roles: [official, child]}
      - {activity: rehearsing, roles: [scholar]}
    audience:
      - {activity: watching, roles: [child, trader]}
      - {activity: applauding, roles: [farmer]}
  tower:
