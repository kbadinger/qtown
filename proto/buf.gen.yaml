version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: qtown/proto
plugins:
  # Remote plugin versions are PINNED so `buf generate` is byte-reproducible
  # across machines (the CI codegen-drift gate depends on it). When bumping a
  # version, run `make proto` and commit the regenerated gen/ in the same change.
  # ─── Go ───
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: ../gen/go
    opt: paths=source_relative

  - remote: buf.build/grpc/go:v1.6.2
    out: ../gen/go
    opt: paths=source_relative

  # ─── Python ───
  - remote: buf.build/protocolbuffers/python:v35.1
    out: ../gen/python

  - remote: buf.build/grpc/python
    out: ../gen/python

  # ─── TypeScript ───
  - remote: buf.build/community/timostamm-protobuf-ts:v2.11.1
    out: ../gen/ts

  # ─── Rust (prost) ───
  # Rust codegen handled by tonic-build in build.rs
  # This entry is a placeholder — remove if using tonic-build exclusively
