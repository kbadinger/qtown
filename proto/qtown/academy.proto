syntax = "proto3";

package qtown;

option go_package = "qtown/proto/qtown;qtown";

import "qtown/common.proto";

// ─── Academy Service (Python + LangChain/LangGraph + Ollama) ───
// AI/ML neighborhood. NPC decision agents, multi-model routing,
// RAG over town history via pgvector.
// Proves: LangGraph state machines, Ollama local inference, RAG source attribution.

service Academy {
  // Health
  rpc Health(HealthRequest) returns (HealthResponse);

  // NPC decision — runs the LangGraph agent
  rpc NPCDecide(NPCDecideRequest)         returns (NPCDecideResponse);

  // Content generation
  rpc GenerateDialogue(DialogueRequest)    returns (DialogueResponse);
  rpc GenerateNewspaper(NewspaperRequest)   returns (NewspaperResponse);

  // RAG — search town history
  rpc SearchHistory(SearchHistoryRequest)   returns (SearchHistoryResponse);

  // Model routing stats
  rpc GetModelStats(ModelStatsRequest)      returns (ModelStatsResponse);

  // NPC travel
  rpc NPCArrive(TravelRequest) returns (TravelResponse);
  rpc NPCDepart(TravelRequest) returns (TravelResponse);
}

message NPCDecideRequest {
  NPCState npc_state       = 1;
  int64    current_tick     = 2;
  repeated string context   = 3;  // recent events visible to this NPC
}

message NPCDecideResponse {
  string decision    = 1;  // action key: "go_to_market", "visit_tavern", etc.
  string narration   = 2;  // natural language description of the decision
  string model_used  = 3;  // which model handled this request
  float  latency_ms  = 4;
  repeated GraphNode trace = 5;  // LangGraph execution trace
}

message GraphNode {
  string name   = 1;
  string state  = 2;  // JSON-serialized state at this node
  float  duration_ms = 3;
}

message DialogueRequest {
  int64  npc_id_a   = 1;
  int64  npc_id_b   = 2;
  string context    = 3;  // what they're talking about
  string tone       = 4;  // "friendly", "hostile", "negotiation"
}

message DialogueResponse {
  repeated DialogueLine lines = 1;
  string model_used  = 2;
  float  latency_ms  = 3;
}

message DialogueLine {
  int64  npc_id  = 1;
  string text    = 2;
  string emotion = 3;
}

message NewspaperRequest {
  int64 tick      = 1;
  int32 max_articles = 2;
}

message NewspaperResponse {
  repeated Article articles = 1;
  string model_used = 2;
  float  latency_ms = 3;
}

message Article {
  string headline = 1;
  string body     = 2;
  string category = 3;  // "economy", "crime", "weather", "politics"
}

message SearchHistoryRequest {
  string query  = 1;
  int32  top_k  = 2;
}

message SearchHistoryResponse {
  repeated SearchResult results = 1;
  float search_latency_ms       = 2;
}

message SearchResult {
  int64  event_id    = 1;
  string text        = 2;
  float  score       = 3;  // similarity score 0-1
  int64  tick        = 4;
  string event_type  = 5;
}

message ModelStatsRequest {}

message ModelStatsResponse {
  int64  total_requests  = 1;
  float  local_pct       = 2;
  float  cloud_pct       = 3;
  float  cost_today_usd  = 4;
  repeated ModelUsage by_model = 5;
}

message ModelUsage {
  string model_name   = 1;
  int64  request_count = 2;
  float  avg_latency_ms = 3;
  float  cost_usd       = 4;
}
