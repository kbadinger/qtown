syntax = "proto3";

package qtown;

option go_package = "qtown/proto/qtown;qtown";

import "qtown/common.proto";

// ─── Market District Service (Go) ───
// Concurrent order book with goroutine-per-trader model.
// Proves: Go concurrency, channels, gRPC streaming, pprof.

service MarketDistrict {
  // Health
  rpc Health(HealthRequest) returns (HealthResponse);

  // Order operations
  rpc PlaceOrder(PlaceOrderRequest)     returns (PlaceOrderResponse);
  rpc CancelOrder(CancelOrderRequest)   returns (CancelOrderResponse);
  rpc GetOrderBook(OrderBookRequest)    returns (OrderBookSnapshot);

  // Trade history
  rpc GetTrades(GetTradesRequest)       returns (GetTradesResponse);

  // Price feed — server-side streaming
  rpc PriceFeed(PriceFeedRequest)       returns (stream PriceUpdate);

  // NPC travel
  rpc NPCArrive(TravelRequest) returns (TravelResponse);
  rpc NPCDepart(TravelRequest) returns (TravelResponse);

  // Benchmarking — stress test endpoint
  rpc StressTest(StressTestRequest)     returns (StressTestResult);
}

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  BID = 1;
  ASK = 2;
}

message PlaceOrderRequest {
  int64     npc_id   = 1;
  string    resource = 2;
  OrderSide side     = 3;
  float     price    = 4;
  float     quantity = 5;
}

message PlaceOrderResponse {
  string order_id = 1;
  bool   accepted = 2;
  string message  = 3;
}

message CancelOrderRequest {
  string order_id = 1;
}

message CancelOrderResponse {
  bool   success = 1;
  string message = 2;
}

message OrderBookRequest {
  string resource = 1;
  int32  depth    = 2;  // max levels to return per side
}

message OrderBookSnapshot {
  string         resource  = 1;
  repeated Order bids      = 2;
  repeated Order asks      = 3;
  float          mid_price = 4;
  float          spread    = 5;
  Timestamp      as_of     = 6;
}

message Order {
  string    id        = 1;
  int64     npc_id    = 2;
  string    resource  = 3;
  OrderSide side      = 4;
  float     price     = 5;
  float     quantity  = 6;
  Timestamp timestamp = 7;
}

message GetTradesRequest {
  string resource = 1;
  int32  limit    = 2;
  int64  since_tick = 3;
}

message GetTradesResponse {
  repeated Trade trades = 1;
}

message Trade {
  string    id            = 1;
  string    buy_order_id  = 2;
  string    sell_order_id = 3;
  string    resource      = 4;
  float     price         = 5;
  float     quantity      = 6;
  Timestamp timestamp     = 7;
}

message PriceFeedRequest {
  repeated string resources = 1;  // subscribe to price updates for these resources
}

message PriceUpdate {
  string    resource  = 1;
  float     bid_price = 2;
  float     ask_price = 3;
  float     mid_price = 4;
  float     volume    = 5;
  Timestamp timestamp = 6;
}

message StressTestRequest {
  int32 num_orders     = 1;
  int32 num_goroutines = 2;
}

message StressTestResult {
  int32 total_orders    = 1;
  int32 total_trades    = 2;
  float elapsed_ms      = 3;
  float p50_latency_us  = 4;
  float p95_latency_us  = 5;
  float p99_latency_us  = 6;
  int32 goroutine_count = 7;
}
